services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: socket_test_app
    working_dir: /var/www/html
    user: "${DOCKER_UID}:${DOCKER_GID}"
    environment:
      HOME: /tmp/home
      COMPOSER_HOME: /tmp/.composer
      XDG_CONFIG_HOME: /tmp/.config
      XDG_CACHE_HOME: /tmp/.cache
    volumes:
      - ./src:/var/www/html
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:stable-alpine
    container_name: socket_test_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: socket_test_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: socket_test
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: socket_test_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
